name: Sync Fork with Upstream

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight UTC
  workflow_dispatch:      # Manual trigger from Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/ashwin-nat/pits-n-giggles.git || true
          git fetch upstream main

      - name: Merge upstream changes
        run: |
          if [ $(git log --oneline HEAD..upstream/main | wc -l) -gt 0 ]; then
            echo "Upstream has $(git log --oneline HEAD..upstream/main | wc -l) new commit(s)"
            git merge upstream/main -m "chore: sync fork with upstream main"
            git push origin main
            echo "✅ Fork synced with upstream"
          else
            echo "✅ Fork already in sync with upstream"
          fi
